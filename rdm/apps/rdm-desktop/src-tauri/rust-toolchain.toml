# Tauri 2.11's dependency tree pulls `time 0.3.47/0.3.48`, whose generated
# `From<HourBase>` impls hit an E0119 coherence error on rustc 1.96. Several
# deps also require edition2024 (rustc >= 1.85) and MSRV 1.88. So the Tauri app
# builds on 1.88.0, while the backend workspace builds on stable (../../.. uses
# its own rust-toolchain.toml). The committed Cargo.lock additionally pins
# `time` down to 0.3.36 (via serde_with 3.9 / plist 1.6) — do not `cargo update`
# it back up, or the coherence error returns.
[toolchain]
channel = "1.88.0"
