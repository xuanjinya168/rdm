name: Release

# 推送形如 v0.2.0 的 tag 时,自动在云端构建 Windows 安装包并发布 Release。
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: build & release (windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/rdm-desktop/package-lock.json

      # 桌面 crate 的工具链由 apps/rdm-desktop/src-tauri/rust-toolchain.toml 固定。
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/rdm-desktop/src-tauri

      - name: Install frontend deps
        working-directory: apps/rdm-desktop
        run: npm ci

      - name: Verify version declarations
        working-directory: apps/rdm-desktop
        run: npm run version:check

      - name: Verify desktop application
        working-directory: apps/rdm-desktop
        run: |
          npm run tools:check
          npm run check
          npm test
          npm run app:bundle
          npm run smoke:exe
          npm run smoke:bundle

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/rdm-desktop
          tagName: ${{ github.ref_name }}
          releaseName: "RDM ${{ github.ref_name }}"
          releaseBody: "RDM ${{ github.ref_name }} 的 Windows 安装包(MSI / NSIS)。"
          releaseDraft: false
          prerelease: false

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          $bundle = "apps/rdm-desktop/src-tauri/target/release/bundle"
          $version = "${{ github.ref_name }}".TrimStart("v")
          $artifacts = Get-ChildItem -Path $bundle -Recurse -File |
            Where-Object { $_.Extension -in ".msi", ".exe" -and $_.Name -like "*_${version}_*" } |
            Sort-Object FullName
          if (-not $artifacts) {
            throw "No MSI or NSIS artifacts found for version $version under $bundle"
          }
          $lines = foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $artifact.FullName).Hash.ToLowerInvariant()
            "$hash  $($artifact.Name)"
          }
          $lines | Set-Content -LiteralPath SHA256SUMS.txt -Encoding ascii

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --clobber
